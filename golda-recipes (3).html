<style>
  :root{
    --cream-bg:#F6EFE2;
    --paper:#FFFCF5;
    --olive:#707D4E;
    --olive-deep:#4C5736;
    --olive-pale:#E4E8D6;
    --rose:#C68A77;
    --rose-pale:#F3E1D9;
    --mint:#9CBBA0;
    --mint-pale:#E2EDE0;
    --ink:#3B3326;
    --ink-soft:#7A7060;
    --line:#E4D9BF;
    --radius:14px;
    --shadow: 0 1px 2px rgba(60,50,30,0.06), 0 6px 18px rgba(60,50,30,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream-bg);
    color:var(--ink);
    font-family:'Heebo',sans-serif;
    font-weight:400;
    line-height:1.5;
    min-height:100vh;
  }
  ::selection{ background:var(--mint); }

  /* ---------- Header ---------- */
  header.topbar{
    position:sticky;
    top:0;
    z-index:30;
    background:linear-gradient(180deg, var(--cream-bg) 85%, rgba(246,239,226,0));
    padding:18px 16px 10px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
  }
  .brand svg{ width:38px; height:38px; flex:0 0 auto; }
  .brand-text h1{
    font-family:'Frank Ruhl Libre',serif;
    font-weight:700;
    font-size:1.5rem;
    margin:0;
    color:var(--olive-deep);
    letter-spacing:0.2px;
  }
  .brand-text p{
    margin:2px 0 0;
    font-size:0.78rem;
    color:var(--ink-soft);
  }
  .search-wrap{
    position:relative;
  }
  .search-wrap input{
    width:100%;
    padding:11px 42px 11px 14px;
    border-radius:999px;
    border:1.5px solid var(--line);
    background:var(--paper);
    font-family:'Heebo',sans-serif;
    font-size:0.95rem;
    color:var(--ink);
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .search-wrap input::placeholder{ color:var(--ink-soft); }
  .search-wrap input:focus{
    border-color:var(--olive);
    box-shadow:0 0 0 3px var(--olive-pale);
  }
  .search-wrap .icon{
    position:absolute;
    inset-inline-end:14px;
    top:50%;
    transform:translateY(-50%);
    width:18px;
    height:18px;
    color:var(--ink-soft);
    pointer-events:none;
  }
  .result-count{
    font-size:0.74rem;
    color:var(--ink-soft);
    margin:6px 4px 0;
    min-height:1em;
  }

  /* ---------- Tabs ---------- */
  nav.tabs{
    position:sticky;
    top:96px;
    z-index:29;
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:10px 16px 12px;
    background:var(--cream-bg);
    scrollbar-width:none;
  }
  nav.tabs::-webkit-scrollbar{ display:none; }
  nav.tabs button{
    flex:0 0 auto;
    font-family:'Heebo',sans-serif;
    font-size:0.86rem;
    font-weight:500;
    padding:8px 16px;
    border-radius:999px;
    border:1.5px solid var(--line);
    background:var(--paper);
    color:var(--ink-soft);
    cursor:pointer;
    white-space:nowrap;
    transition:all .15s ease;
  }
  nav.tabs button .count{
    font-size:0.74rem;
    opacity:0.75;
    margin-inline-start:5px;
  }
  nav.tabs button:hover{ border-color:var(--olive); color:var(--olive-deep); }
  nav.tabs button.active{
    background:var(--olive);
    border-color:var(--olive);
    color:#fff;
  }
  nav.tabs button:focus-visible, .search-wrap input:focus-visible{
    outline:3px solid var(--rose);
    outline-offset:2px;
  }

  /* ---------- Main / cards ---------- */
  main{ padding:6px 16px 60px; max-width:1080px; margin:0 auto; }
  .panel{ display:none; }
  .panel.active{ display:block; }

  .section-note{
    font-size:0.82rem;
    color:var(--ink-soft);
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 14px;
    margin-bottom:14px;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px,1fr));
    gap:14px;
  }

  .card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    box-shadow:var(--shadow);
  }
  .card h3{
    font-family:'Frank Ruhl Libre',serif;
    font-weight:700;
    font-size:1.12rem;
    margin:0 0 8px;
    color:var(--ink);
  }
  .field{ margin:6px 0; font-size:0.88rem; }
  .field .label{
    color:var(--ink-soft);
    font-size:0.72rem;
    font-weight:600;
    display:block;
    margin-bottom:1px;
  }
  .field .value{ color:var(--ink); }

  .badges{ display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
  .badge{
    font-size:0.72rem;
    font-weight:600;
    padding:4px 10px;
    border-radius:999px;
    display:inline-flex;
    align-items:center;
    gap:4px;
  }
  .badge.flat{ background:var(--mint-pale); color:var(--olive-deep); }
  .badge.tall{ background:var(--rose-pale); color:#8C4E3A; }
  .badge.allergen{ background:var(--rose); color:#fff; }
  .badge.discontinued{ background:#E8E2D4; color:var(--ink-soft); }

  .card.is-discontinued{ opacity:0.78; }
  .card.is-discontinued h3::after{
    content:" · לא בשימוש";
    font-family:'Heebo',sans-serif;
    font-weight:500;
    font-size:0.72rem;
    color:var(--ink-soft);
  }

  /* ---------- Hide button on cards ---------- */
  .card{ position:relative; }
  .hide-btn{
    position:absolute;
    top:10px;
    left:10px;
    width:28px;
    height:28px;
    border-radius:50%;
    border:1px solid var(--line);
    background:var(--cream-bg);
    color:var(--ink-soft);
    font-size:0.85rem;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    transition:opacity .15s ease;
    padding:0;
    line-height:1;
  }
  .card:hover .hide-btn,
  .card:active .hide-btn{ opacity:1; }
  .hide-btn:hover{ background:var(--rose-pale); border-color:var(--rose); color:#8C4E3A; }
  .hide-btn.restore-btn{ opacity:1; background:var(--rose-pale); border-color:var(--rose); color:#8C4E3A; }

  /* ---------- Hidden bar ---------- */
  .hidden-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--rose-pale);
    border-bottom:1px solid var(--rose);
    padding:8px 16px;
    font-size:0.82rem;
    color:#8C4E3A;
    font-weight:500;
  }
  .hidden-bar button{
    font-family:'Heebo',sans-serif;
    font-size:0.78rem;
    font-weight:600;
    background:none;
    border:1.5px solid #C68A77;
    color:#8C4E3A;
    border-radius:999px;
    padding:3px 12px;
    cursor:pointer;
  }
  .hidden-bar button:hover{ background:var(--rose); color:#fff; }

  .divider-row{
    grid-column:1 / -1;
    display:flex;
    align-items:center;
    gap:10px;
    margin:18px 0 4px;

  .divider-row .line{ flex:1; height:1px; background:var(--line); }
  .divider-row span{
    font-family:'Frank Ruhl Libre',serif;
    font-weight:700;
    font-size:0.95rem;
    color:var(--ink-soft);
  }

  /* ripple cards */
  .ripple-list{ list-style:none; margin:0; padding:0; }
  .ripple-list li{
    display:flex;
    justify-content:space-between;
    font-size:0.88rem;
    padding:5px 0;
    border-bottom:1px dashed var(--line);

  .ripple-list li:last-child{ border-bottom:none; }
  .ripple-list .qty{ color:var(--olive-deep); font-weight:600; white-space:nowrap; }

  .mini-panels{ display:flex; gap:10px; margin-top:8px; flex-wrap:wrap; }
  .mini-panel{

    padding:8px 10px;

  .acai-card{ max-width:480px; margin:0 auto; }
  .acai-table{ width:100%; border-collapse:collapse; margin-top:8px; font-size:0.9rem; }
  .acai-table th{
    font-family:'Heebo',sans-serif;

  .acai-table td{ padding:7px 4px; border-bottom:1px solid var(--line); }

    padding:50px 20px;
    color:var(--ink-soft);
  }
  .empty-state .emoji{ font-size:2rem; display:block; margin-bottom:8px; }

  /* ---------- Calculator ---------- */
  .calc-card{ max-width:560px; margin:0 auto; }
  .calc-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    margin-bottom:6px;
  }
  .calc-field label{
    display:block;
    font-size:0.72rem;
    font-weight:600;
    color:var(--ink-soft);
    margin-bottom:4px;
  }
  .calc-field input{
    width:100%;
    padding:9px 10px;
    border-radius:8px;
    border:1.5px solid var(--line);
    background:var(--cream-bg);
    font-family:'Heebo',sans-serif;
    font-size:0.95rem;
    font-weight:600;
    color:var(--ink);
    outline:none;
  }
  .calc-field input:focus{
    border-color:var(--olive);
    box-shadow:0 0 0 3px var(--olive-pale);
  }
  .calc-result{ display:flex; flex-direction:column; gap:0; margin-top:14px; }
  .calc-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:9px 2px;
    border-bottom:1px dashed var(--line);
    font-size:0.9rem;
  }
  .calc-row:last-child{ border-bottom:none; }
  .calc-row span{ color:var(--ink-soft); }
  .calc-row b{ color:var(--ink); font-weight:700; }
  .calc-row.highlight{
    background:var(--olive-pale);
    border-radius:10px;
    border-bottom:none;
    margin:4px 0;
    padding:11px 12px;
  }
  .calc-row.highlight span{ color:var(--olive-deep); font-weight:600; }
  .calc-row.highlight b{ color:var(--olive-deep); font-size:1.1rem; }
  .calc-row.sub{ font-size:0.78rem; }
  .calc-row.sub span, .calc-row.sub b{ color:var(--ink-soft); font-weight:500; }

    color:var(--ink-soft);
    margin-top:10px;
    line-height:1.5;
  }

  }

  footer{
    text-align:center;
    font-size:0.74rem;
    color:var(--ink-soft);
    padding:10px 16px 36px;
  }

  @media (max-width:480px){

    nav.tabs{ top:90px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; }
  }

  {id:'cream', label:'שמנת', kind:'cream'},

let activeTab = 'cream';
let query = '';

function esc(s){
  return (s===undefined||s===null) ? '' : String(s);
}

function matches(obj, q){
  if(!q) return true;
  try{ return JSON.stringify(obj).toLowerCase().includes(q.toLowerCase()); }
  catch(e){ return true; }
}

function field(label, value){
  if(!value || value==='-' ) return '';
  return `<div class="field"><span class="label">${esc(label)}</span><span class="value">${esc(value)}</span></div>`;
}

function badgesFor(item){
  let html = '<div class="badges">';
  if(item.flat){
    html += item.flat==='V'
      ? `<span class="badge flat">✓ מאושר שטוח</span>`
      : `<span class="badge flat">שטוח: ${esc(item.flat)}</span>`;
  }
  if(item.tall){
    html += item.tall==='V'
      ? `<span class="badge tall">✓ מאושר גבוהה</span>`
      : `<span class="badge tall">גבוהה: ${esc(item.tall)}</span>`;
  }
  if(item.allergens){
    html += `<span class="badge allergen">⚠ אלרגנים: ${esc(item.allergens)}</span>`;
  }
  html += '</div>';
  return html;
}

function creamCard(item){
  return `<div class="card">
    ${hideBtn(item.name)}
    <h3>${esc(item.name)}</h3>
    ${field('בסיס', item.base)}
    ${field('מחית / שקילה', item.mix)}
    ${field('מינון בגרם', item.dosage)}
    ${field('קיפולים', item.fold)}
    ${field('ציפוי', item.coat)}
    ${field('קישוט', item.garnish)}
    ${badgesFor(item)}
  </div>`;
}

function fullCard(item, discontinued){
  return `<div class="card ${discontinued?'is-discontinued':''}">
    ${hideBtn(item.name)}
    <h3>${esc(item.name)}</h3>

    ${field('קישוט', item.garnish)}
    ${field('הערה', item.note)}
    ${badgesFor(item)}

}

function rippleCard(item){
  const rows = item.items.map(([n,q,u])=>
    `<li><span>${esc(n)}</span><span class="qty">${esc(q)} ${esc(u)}</span></li>`
  ).join('');
  return `<div class="card">
    ${hideBtn(item.name)}
    <h3>${esc(item.name)}</h3>
    <ul class="ripple-list">${rows}</ul>
  </div>`;
}

function acaiCard(a){
  const rowsMap = [['asai','אסאי'],['sorbet','סורבה'],['water','מים'],['mango','מנגו'],['pineapple','אננס'],['banana','בננה'],['strawberry','תות']];
  const rows = rowsMap.map(([k,label])=>
    `<tr><td>${label}</td><td>${esc(a.batch[k])}</td><td>${esc(a.perKg[k])}</td></tr>`
  ).join('');
  return `<div class="card acai-card">
    <h3>מתכון אסאי</h3>
    <table class="acai-table">
      <thead><tr><th>מרכיב</th><th>מתכון מלא</th><th>לקילו אסאי</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function renderEmpty(){
  return `<div class="empty-state"><span class="emoji">🍦</span>לא נמצאו טעמים מתאימים לחיפוש</div>`;
}

function renderTab(){
  const main = document.getElementById('main');
  let html = '';

  if(activeTab==='cream'){
    const items = DATA.cream.filter(i=>matches(i,query) && (showingHidden || !hiddenItems.has(i.name)));
    html = items.length ? `<div class="grid">${items.map(creamCard).join('')}</div>` : renderEmpty();

  } else if(activeTab==='ripples'){
    const items = DATA.ripples.filter(i=>matches(i,query) && (showingHidden || !hiddenItems.has(i.name)));
    html = `<div class="section-note">מתכוני וריגאטו ורטבים — יחס בין הקרם לפיצוח/תוספת, לפי ק"ג</div>`;
    html += items.length ? `<div class="grid">${items.map(rippleCard).join('')}</div>` : renderEmpty();

  } else if(activeTab==='fruit'){
    const items = DATA.fruit.filter(i=>matches(i,query) && (showingHidden || !hiddenItems.has(i.name)));
    html = `<div class="section-note">טבלת יחסי פרי/בסיס/מים — לקילו גלאטו לעומת למנה מלאה (באטצ')</div>`;
    html += items.length ? `<div class="grid">${items.map(fruitCard).join('')}</div>` : renderEmpty();

  } else if(activeTab==='acai'){
    const a = DATA.acai;
    html = matches(a,query) ? `<div class="grid">${acaiCard(a)}</div>` : renderEmpty();

  } else if(activeTab==='full'){
    const active = DATA.fullActive.filter(i=>matches(i,query) && (showingHidden || !hiddenItems.has(i.name)));
    const disc = DATA.fullDiscontinued.filter(i=>matches(i,query) && (showingHidden || !hiddenItems.has(i.name)));
    html = `<div class="section-note">המאגר המלא, כולל אלרגנים וצורת הגשה מאושרת. הטעמים שלא בשימוש מוצגים בהמשך, מעומעמים.</div>`;
    if(active.length===0 && disc.length===0){
      html += renderEmpty();
    } else {
      html += `<div class="grid">`;
      html += active.map(i=>fullCard(i,false)).join('');
      if(disc.length){
        html += `<div class="divider-row"><span>טעמים שהוצאו משימוש</span><div class="line"></div></div>`;
        html += disc.map(i=>fullCard(i,true)).join('');
      }
      html += `</div>`;
    }
  } else if(activeTab==='calc'){
    html = `<div class="section-note">חשבו כמה ג'ריקנים מלאים להוסיף ישירות למכונה, וכמה לשקול בנפרד — לפי מספר הבאסקטות שרוצים להכין.</div>
    <div class="card calc-card">
      <div class="calc-grid">
        <div class="calc-field">
          <label for="calcBaskets">מספר באסקטות</label>
          <input type="number" id="calcBaskets" min="0" step="1" value="3" inputmode="decimal">
        </div>
        <div class="calc-field">
          <label for="calcPerBasket">גרם נוזל לבאסקטה</label>
          <input type="number" id="calcPerBasket" min="0" step="1" value="3600" inputmode="decimal">
        </div>
        <div class="calc-field">
          <label for="calcJerryLiters">נפח ג'ריקן (ליטר)</label>
          <input type="number" id="calcJerryLiters" min="0" step="0.1" value="5" inputmode="decimal">
        </div>
        <div class="calc-field">
          <label for="calcDensity">צפיפות (גרם לליטר)</label>
          <input type="number" id="calcDensity" min="0" step="1" value="1000" inputmode="decimal">
        </div>
      </div>
      <div class="calc-result" id="calcResult"></div>
      <div class="calc-note">אפשר לערוך כל שדה — למשל אם הציפוי משנה את הגרם לבאסקטה, או אם לשמנת ולסורבה יש צפיפות שונה מהג'ריקן. החישוב מתעדכן מיד.</div>
    </div>`;
  }

  main.innerHTML = `<div class="panel active">${html}</div>`;

  const counts = {
    cream: DATA.cream.length,
    ripples: DATA.ripples.length,
    fruit: DATA.fruit.length,
    acai: 1,
    full: DATA.fullActive.length + DATA.fullDiscontinued.length,
    calc: 0,
  };
  const shown = activeTab==='cream' ? DATA.cream.filter(i=>matches(i,query)).length
    : activeTab==='ripples' ? DATA.ripples.filter(i=>matches(i,query)).length
    : activeTab==='fruit' ? DATA.fruit.filter(i=>matches(i,query)).length
    : activeTab==='acai' ? (matches(DATA.acai,query)?1:0)
    : activeTab==='calc' ? 0
    : DATA.fullActive.filter(i=>matches(i,query)).length + DATA.fullDiscontinued.filter(i=>matches(i,query)).length;

  document.getElementById('resultCount').textContent = (query && activeTab!=='calc') ? `${shown} תוצאות מתוך ${counts[activeTab]}` : '';

  if(activeTab==='calc'){ setupCalc(); }
  attachCardEvents();
}

    const perBasket = parseFloat(document.getElementById('calcPerBasket').value) || 0;
    const liters = parseFloat(document.getElementById('calcJerryLiters').value) || 0;
    const density = parseFloat(document.getElementById('calcDensity').value) || 0;

    const totalNeeded = baskets * perBasket;
    const jerryGrams = liters * density;
    let fullJerrycans = 0;
    let remainder = totalNeeded;
    if(jerryGrams > 0){
      fullJerrycans = Math.floor(totalNeeded / jerryGrams + 1e-9);
      remainder = Math.max(0, totalNeeded - (fullJerrycans * jerryGrams));
    }
    const totalJerrycansExact = jerryGrams>0 ? (totalNeeded/jerryGrams) : 0;

    const fmt = n => Number.isFinite(n) ? (Math.round(n*10)/10).toLocaleString('he-IL') : '0';

    document.getElementById('calcResult').innerHTML = `
      <div class="calc-row"><span>סה"כ נוזל נדרש</span><b>${fmt(totalNeeded)} גרם</b></div>
      <div class="calc-row"><span>גרם בכל ג'ריקן סגור</span><b>${fmt(jerryGrams)} גרם</b></div>
      <div class="calc-row highlight"><span>ג'ריקנים מלאים להוסיף ישירות</span><b>${fullJerrycans}</b></div>
      <div class="calc-row highlight"><span>לשקול בנפרד ולהוסיף</span><b>${fmt(remainder)} גרם</b></div>
      <div class="calc-row sub"><span>סה"כ ג'ריקנים (כולל חלקי)</span><b>${fmt(totalJerrycansExact)}</b></div>
    `;
  };
  ids.forEach(id=>{
    document.getElementById(id).addEventListener('input', recalc);
  });
  recalc();
}

function buildTabs(){
  const nav = document.getElementById('tabs');
  const counts = {
    cream: DATA.cream.length,
    ripples: DATA.ripples.length,
    fruit: DATA.fruit.length,
    acai: 1,
    full: DATA.fullActive.length + DATA.fullDiscontinued.length,
  };
  nav.innerHTML = TABS.map(t=>
    `<button data-tab="${t.id}" class="${t.id===activeTab?'active':''}">${t.label}${t.id!=='calc'?`<span class="count">${counts[t.id]}</span>`:''}</button>`
  ).join('');
  nav.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeTab = btn.dataset.tab;
      nav.querySelectorAll('button').forEach(b=>b.classList.toggle('active', b===btn));
      renderTab();
    });
  });
}

function init(){
  const total = DATA.cream.length + DATA.fullActive.length + DATA.fullDiscontinued.length;
  document.getElementById('subtitle').textContent = `${total} טעמים מתועדים · ${DATA.ripples.length} מתכוני רוטב · ${DATA.fruit.length} יחסי פרי`;
  buildTabs();
  renderTab();
  updateHiddenBar();
  document.getElementById('search').addEventListener('input', (e)=>{
    query = e.target.value.trim();
    renderTab();
  });
}

/* ========== Hidden items ========== */
let hiddenItems = new Set(JSON.parse(localStorage.getItem('golda-hidden') || '[]'));
let showingHidden = false;

function saveHidden(){
  localStorage.setItem('golda-hidden', JSON.stringify([...hiddenItems]));
}

function updateHiddenBar(){
  const bar = document.getElementById('hiddenBar');
  if(hiddenItems.size === 0){
    bar.style.display = 'none';
    showingHidden = false;
    return;
  }
  bar.style.display = 'flex';
  bar.innerHTML = `<span>${hiddenItems.size} טעמים מוסתרים</span>
    <button id="toggleHiddenBtn">${showingHidden ? '← הסתר שוב' : 'ניהול הסתרות'}</button>`;
  document.getElementById('toggleHiddenBtn').addEventListener('click', ()=>{
    showingHidden = !showingHidden;
    renderTab();
    updateHiddenBar();
  });
}

function attachCardEvents(){
  document.getElementById('main').addEventListener('click', e=>{
    const btn = e.target.closest('.hide-btn');
    if(!btn) return;
    const name = btn.dataset.name;
    if(hiddenItems.has(name)){
      hiddenItems.delete(name);
    } else {
      hiddenItems.add(name);
    }
    saveHidden();
    updateHiddenBar();
    renderTab();
  }, {once:true});
}

function hideBtn(name){
  const isHidden = hiddenItems.has(name);
  return `<button class="hide-btn${isHidden?' restore-btn':''}" data-name="${esc(name)}" title="${isHidden?'הצג טעם':'הסתר טעם'}">${isHidden?'👁':'🙈'}</button>`;
}

init();
</script>
