function getLevelInfo(pts){
  const lv=[...LEVELS].reverse().find(l=>pts>=l.min);
  const nxt=LEVELS.find(l=>l.min>pts);
  const pct=nxt?((pts-lv.min)/(nxt.min-lv.min))*100:100;
  return{lv,nxt,pct};
}
function formatStamp(ts){
  if(!ts)return"";
  const d=new Date(ts);
  return d.toLocaleDateString("he-IL",{day:"2-digit",month:"2-digit",year:"2-digit"})+" "+
         d.toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"});
}
function stampImage(dataUrl,ts){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement("canvas");
      c.width=img.width;c.height=img.height;
      const ctx=c.getContext("2d");ctx.drawImage(img,0,0);
      const label=formatStamp(ts);
      const fs=Math.max(16,Math.round(img.width*0.035));
      ctx.font=`bold ${fs}px monospace`;
      const pad=10,tw=ctx.measureText(label).width;
      const bx=img.width-tw-pad*2-8,by=img.height-fs-pad*2-8;
      ctx.fillStyle="rgba(0,0,0,0.65)";ctx.beginPath();ctx.roundRect(bx,by,tw+pad*2,fs+pad*2,6);ctx.fill();
      ctx.fillStyle="#fff";ctx.fillText(label,bx+pad,by+fs+pad-2);
      res(c.toDataURL("image/jpeg",.88));
    };img.src=dataUrl;
  });
}
function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
function getWeekDates(){
  const today=new Date();
  const day=today.getDay();
  const sunday=new Date(today);
  sunday.setDate(today.getDate()-day);
  return DAYS.map((_,i)=>{const d=new Date(sunday);d.setDate(sunday.getDate()+i);return`${d.getDate()}.${d.getMonth()+1}`;});
}

function RatingBar({value,onChange,size="md"}){
  const [hover,setHover]=useState(null);
  const active=hover||value;
  const sz=size==="sm"?22:32;
  return <div style={{display:"flex",gap:size==="sm"?3:6,alignItems:"center"}}>
    {[1,2,3,4,5].map(n=>(
      <button key={n} onClick={()=>onChange&&onChange(n)}
        onMouseEnter={()=>onChange&&setHover(n)} onMouseLeave={()=>setHover(null)}
        style={{width:sz,height:sz,borderRadius:8,border:"none",cursor:onChange?"pointer":"default",
          background:active>=n?RATING_COLORS[n]+"cc":"rgba(255,255,255,0.07)",
          color:active>=n?"#fff":"#475569",fontSize:size==="sm"?11:14,fontWeight:700,transition:"all 0.15s"}}>
        {n}
      </button>
    ))}
    {active&&<span style={{fontSize:size==="sm"?10:12,color:RATING_COLORS[Math.round(active)],fontWeight:700,whiteSpace:"nowrap"}}>{RATING_LABELS[Math.round(active)]}</span>}
  </div>;
}

  const prizes=PRIZE_SPLIT.map(p=>Math.round(budget*p));
  const board=[...EMPLOYEES_DEFAULT].map(e=>e.id===4?{...e,points:myPoints}:e).sort((a,b)=>b.points-a.points);
  const myRank=board.findIndex(e=>e.id===4)+1;
  const {lv,nxt,pct:lvPct}=getLevelInfo(myPoints);
  const pendingCount=Object.values(clPhotos).filter(p=>p.status==="pending").length;

  function tryOpenAdmin(pin){
    if(pin===managerPin){setPinInput("");setPinError(false);setShowPin(false);setAdminOpen(true);}
    else{setPinError(true);setPinInput("");setTimeout(()=>setPinError(false),1200);}
  }
  async function submitClPhoto(key,dataUrl){
    const ts=Date.now();
    const stamped=await stampImage(dataUrl,ts);
    setClPhotos(prev=>{const next={...prev,[key]:{url:stamped,status:"pending",timestamp:ts,rating:null}};ss("gp_clphotos",next);return next;});
  }
  function adminApprove(key,rating){
    setClPhotos(prev=>{const next={...prev,[key]:{...prev[key],status:"approved",rating}};ss("gp_clphotos",next);return next;});
    setMyPoints(p=>{const v=p+rating;ss("gp_pts",v);return v;});
    setMonthly(m=>{const v=+(m+0.5).toFixed(1);ss("gp_monthly",v);return v;});
  }
  function adminReject(key){
    setClPhotos(prev=>{const next={...prev,[key]:{...prev[key],status:"rejected",rating:null}};ss("gp_clphotos",next);return next;});
  }
  function updateSchedule(dayIdx,shift,name){
    const key=`${dayIdx}_${shift}`;
    setSchedule(prev=>{const next={...prev,[key]:name};ss("gp_schedule",next);return next;});
  }

  if(adminOpen) return <AdminPage clPhotos={clPhotos} onApprove={adminApprove} onReject={adminReject}
    onClose={()=>setAdminOpen(false)} pendingCount={pendingCount}
    managerPin={managerPin} onChangePin={p=>{setManagerPin(p);ss("gp_pin",p);}}
    budget={budget} onChangeBudget={b=>{setBudget(b);ss("gp_budget",b);}}
    prizes={prizes} board={board}/>;

  return <div style={{minHeight:"100vh",background:`radial-gradient(ellipse at 20% 0%,rgba(216,171,96,0.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(139,92,246,0.08) 0%,transparent 60%),${DARK}`}}>

    {/* HEADER */}
    <header style={{background:"rgba(10,10,15,0.92)",backdropFilter:"blur(24px)",borderBottom:`1px solid rgba(216,171,96,0.18)`,padding:"0 16px",position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 24px rgba(0,0,0,0.4)"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",height:60}}>
        {/* Logo */}
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:38,height:38,borderRadius:12,background:`linear-gradient(135deg,${GOLD},${GOLD2})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,boxShadow:`0 4px 14px rgba(216,171,96,0.35)`}}>🍦</div>
          <div>
            <div style={{fontWeight:900,fontSize:15,letterSpacing:.5,background:`linear-gradient(90deg,${GOLD2},${GOLD})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>גולדה זכרון יעקב</div>
            <div style={{fontSize:9,color:"#475569",letterSpacing:1,textTransform:"uppercase",marginTop:-1}}>מרכז העובדים</div>
          </div>
        </div>
        {/* Chips */}
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <GoldChip>⭐ {myPoints}</GoldChip>
          <GoldChip color="#22c55e">🏅 #{myRank}</GoldChip>
          <button onClick={()=>{setPinInput("");setShowPin(true);}} style={{background:"rgba(255,255,255,0.04)",border:`1px solid rgba(216,171,96,0.2)`,borderRadius:"50%",width:32,height:32,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,position:"relative"}}>
            🔐
            {pendingCount>0&&<span style={{position:"absolute",top:-4,left:-4,width:16,height:16,borderRadius:"50%",background:"#ef4444",color:"#fff",fontSize:9,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>{pendingCount}</span>}
          </button>
        </div>
      </div>
      {/* Level bar */}
      <div style={{display:"flex",alignItems:"center",gap:10,paddingBottom:10}}>
        <span style={{fontSize:10,color:lv.color,fontWeight:700,whiteSpace:"nowrap"}}>{lv.name}</span>
        <div style={{flex:1,background:"rgba(255,255,255,0.06)",borderRadius:10,height:4,overflow:"hidden"}}>
          <div style={{width:`${lvPct}%`,height:"100%",borderRadius:10,transition:"width 0.6s",background:`linear-gradient(90deg,${lv.color},${GOLD})`}}/>
        </div>
        {nxt&&<span style={{fontSize:9,color:"#334155",whiteSpace:"nowrap"}}>{nxt.min-myPoints}⭐</span>}
      </div>
    </header>

    {/* PAGES */}
    <main style={{padding:"0 0 96px",position:"relative",zIndex:1}}>
      {tab==="home"&&<HomePage setTab={setTab} myRank={myRank} monthlyEarned={monthlyEarned} prizes={prizes} budget={budget} clPhotos={clPhotos}/>}
      {tab==="checklist"&&<ChecklistPage clPhotos={clPhotos} onSubmit={submitClPhoto}/>}
      {tab==="shifts"&&<ShiftsPage schedule={schedule} onUpdate={updateSchedule}/>}
      {tab==="wallet"&&<WalletPage monthlyEarned={monthlyEarned} prizes={prizes} budget={budget}/>}
      {tab==="videos"&&<VideosPage filter={vidFilter} setFilter={setVidFilter}/>}
      {tab==="messages"&&<MessagesPage/>}
      {tab==="leaderboard"&&<LeaderboardPage board={board} prizes={prizes} budget={budget}/>}
    </main>

    {/* BOTTOM NAV */}
    <nav style={{position:"fixed",bottom:0,left:0,right:0,zIndex:200,background:"rgba(10,10,15,0.96)",backdropFilter:"blur(24px)",borderTop:`1px solid rgba(216,171,96,0.12)`,display:"flex",justifyContent:"space-around",padding:"8px 0 12px",boxShadow:"0 -8px 30px rgba(0,0,0,0.5)"}}>
      {[
        {id:"home",icon:"🏠",label:"בית"},
        {id:"checklist",icon:"✅",label:"צ׳ק ליסט"},
        {id:"shifts",icon:"👥",label:"סידור"},
        {id:"wallet",icon:"💰",label:"ארנק"},
        {id:"leaderboard",icon:"🏆",label:"דירוג"},
        {id:"videos",icon:"🎬",label:"הדרכות"},
        {id:"messages",icon:"💬",label:"הודעות"},
      ].map(item=>(
        <button key={item.id} onClick={()=>setTab(item.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"2px 6px",borderRadius:10,transform:tab===item.id?"translateY(-4px)":"none",transition:"transform 0.2s"}}>
          <span style={{fontSize:19}}>{item.icon}</span>
          <span style={{fontSize:8,fontWeight:tab===item.id?800:400,color:tab===item.id?GOLD:"#334155",letterSpacing:.3}}>{item.label}</span>
          {tab===item.id&&<div style={{width:20,height:2,borderRadius:2,background:`linear-gradient(90deg,${GOLD},${GOLD2})`}}/>}
        </button>
      ))}
    </nav>

    {/* PIN MODAL */}
    {showPin&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",backdropFilter:"blur(8px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:900}} onClick={()=>{setShowPin(false);setPinInput("");setPinError(false);}}>
      <div style={{background:"linear-gradient(135deg,#0f0f18,#1a1a28)",border:`2px solid ${pinError?"rgba(239,68,68,0.6)":`rgba(216,171,96,0.3)`}`,borderRadius:28,padding:"36px 32px",maxWidth:300,width:"90%",boxShadow:`0 24px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(216,171,96,0.05)`,animation:pinError?"shake 0.4s ease":"popIn 0.3s ease"}} onClick={e=>e.stopPropagation()}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:38,marginBottom:10}}>🔐</div>
          <div style={{fontWeight:900,fontSize:18,color:GOLD,letterSpacing:.5}}>כניסת מנהל</div>
          <div style={{fontSize:11,color:"#334155",marginTop:4}}>הכנס קוד PIN</div>
        </div>
        <div style={{display:"flex",justifyContent:"center",gap:14,marginBottom:24}}>
          {[0,1,2,3].map(i=><div key={i} style={{width:14,height:14,borderRadius:"50%",background:pinInput.length>i?(pinError?"#ef4444":GOLD):"rgba(255,255,255,0.08)",border:`2px solid ${pinInput.length>i?(pinError?"#ef4444":GOLD):"rgba(255,255,255,0.15)"}`,transition:"all 0.15s"}}/>)}
        </div>
        {pinError&&<div style={{textAlign:"center",fontSize:12,color:"#f87171",marginBottom:14,fontWeight:700}}>✗ קוד שגוי</div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
          {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k,i)=>(
            <button key={i} onClick={()=>{
              if(k==="⌫"){setPinInput(p=>p.slice(0,-1));}
              else if(k!==""){const next=pinInput+k;setPinInput(next);if(next.length===4)tryOpenAdmin(next);}
            }} style={{border:k===""?"none":`1px solid ${BORDER}`,borderRadius:14,padding:"14px 0",background:k===""?"transparent":"rgba(255,255,255,0.04)",color:"#f1f5f9",fontSize:18,fontWeight:700,cursor:k===""?"default":"pointer",transition:"background 0.15s"}}>{k}</button>
          ))}
        </div>
        <button onClick={()=>{setShowPin(false);setPinInput("");setPinError(false);}} style={{width:"100%",marginTop:18,border:`1px solid ${BORDER}`,borderRadius:14,padding:12,background:"transparent",color:"#334155",fontSize:13,cursor:"pointer"}}>ביטול</button>
      </div>
    </div>}
  </div>;
}

          <div style={{fontSize:12,color:"#64748b",marginTop:4}}>{approvedTotal} / {totalItems} אושרו</div>

        </div>
        <div style={{fontSize:48}}>✅</div>

        const total=cl.sections.reduce((s,sec)=>s+sec.items.length,0);
        const approved=cl.sections.reduce((s,sec,si)=>s+sec.items.filter((_,ii)=>clPhotos[`${key}_${si}_${ii}`]?.status==="approved").length,0);
        const pct=Math.round((approved/total)*100);
        return <Card key={key} style={{padding:"12px 14px",cursor:"pointer",border:`1px solid ${cl.color}22`}} onClick={()=>setTab("checklist")}>

}

// ── SHIFTS PAGE ───────────────────────────────────────────────────────────────
function ShiftsPage({schedule,onUpdate}){
  const weekDates=getWeekDates();
  const [editCell,setEditCell]=useState(null); // {dayIdx,shift}
  const [selectedName,setSelectedName]=useState(EMPLOYEES_NAMES[0]);

  function openEdit(dayIdx,shift){
    const key=`${dayIdx}_${shift}`;
    setSelectedName(schedule[key]||EMPLOYEES_NAMES[0]);
    setEditCell({dayIdx,shift});
  }
  function confirmEdit(){
    if(!editCell)return;
    onUpdate(editCell.dayIdx,editCell.shift,selectedName);
    setEditCell(null);
  }

  return <div style={{padding:"20px 16px",animation:"fadeUp 0.4s ease"}}>
    <div style={{fontSize:20,fontWeight:900,marginBottom:4,letterSpacing:-.3}}>👥 סידור משמרות</div>
    <div style={{fontSize:12,color:"#475569",marginBottom:20}}>לחץ על תא לבחירת עובד</div>

    {/* Table */}
    <div style={{borderRadius:18,overflow:"hidden",border:`1px solid ${BORDER}`,background:"rgba(255,255,255,0.02)",marginBottom:20}}>
      {/* Header */}
      <div style={{display:"grid",gridTemplateColumns:"72px 1fr 1fr",background:`rgba(216,171,96,0.08)`,borderBottom:`1px solid ${BORDER}`}}>
        <div style={{padding:"10px 12px",fontSize:10,fontWeight:700,color:"#475569",letterSpacing:.5}}>יום</div>
        <div style={{padding:"10px 8px",fontSize:10,fontWeight:700,color:"#fbbf24",textAlign:"center",borderRight:`1px solid ${BORDER}`,borderLeft:`1px solid ${BORDER}`}}>☀️ בוקר</div>
        <div style={{padding:"10px 8px",fontSize:10,fontWeight:700,color:"#a78bfa",textAlign:"center"}}>🌙 ערב</div>
      </div>
      {DAYS.map((day,di)=>{
        const morningKey=`${di}_morning`;
        const eveningKey=`${di}_evening`;
        const morning=schedule[morningKey];
        const evening=schedule[eveningKey];
        const isToday=new Date().getDay()===di;
        return <div key={di} style={{display:"grid",gridTemplateColumns:"72px 1fr 1fr",borderBottom:di<6?`1px solid ${BORDER}`:"none",background:isToday?"rgba(216,171,96,0.04)":"transparent"}}>
          <div style={{padding:"12px 12px",display:"flex",flexDirection:"column",justifyContent:"center"}}>
            <div style={{fontSize:12,fontWeight:isToday?800:600,color:isToday?GOLD:"#f1f5f9"}}>{day}</div>
            <div style={{fontSize:10,color:"#334155"}}>{weekDates[di]}</div>
          </div>
          {["morning","evening"].map((shift,si)=>{
            const key=`${di}_${shift}`;
            const val=schedule[key];
            const isEmpty=!val||val==="—";
            return <div key={shift} style={{padding:"10px 8px",borderRight:si===0?`1px solid ${BORDER}`:"none",borderLeft:si===0?`1px solid ${BORDER}`:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",background:editCell?.dayIdx===di&&editCell?.shift===shift?"rgba(216,171,96,0.08)":"transparent",transition:"background 0.15s"}}
              onClick={()=>openEdit(di,shift)}>
              <div style={{textAlign:"center"}}>
                {isEmpty
                  ? <div style={{fontSize:11,color:"#334155",border:`1px dashed #334155`,borderRadius:8,padding:"4px 10px"}}>+ בחר</div>
                  : <div style={{fontSize:12,fontWeight:700,color:si===0?"#fbbf24":"#a78bfa",background:si===0?"rgba(251,191,36,0.1)":"rgba(167,139,250,0.1)",borderRadius:8,padding:"4px 10px"}}>{val}</div>
                }
              </div>
            </div>;
          })}
        </div>;
      })}
    </div>

    {/* Legend */}
    <Card style={{padding:"14px 16px"}}>
      <div style={{fontSize:11,color:GOLD,fontWeight:700,marginBottom:10,letterSpacing:.5}}>👤 עובדים</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {EMPLOYEES_DEFAULT.map(e=><div key={e.id} style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.04)",border:`1px solid ${BORDER}`,borderRadius:10,padding:"5px 10px"}}>
          <span style={{fontSize:16}}>{e.avatar}</span>
          <span style={{fontSize:12,color:"#94a3b8"}}>{e.name}</span>
        </div>)}
      </div>
    </Card>

    {/* Edit modal */}
    {editCell&&<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(6px)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:800,padding:"0 0 96px"}} onClick={()=>setEditCell(null)}>
      <div style={{background:"linear-gradient(135deg,#0f0f18,#1a1a28)",border:`1px solid rgba(216,171,96,0.2)`,borderRadius:"24px 24px 20px 20px",padding:"24px 20px",width:"100%",maxWidth:480,animation:"popIn 0.25s ease"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:14,fontWeight:800,color:GOLD,marginBottom:16}}>
          בחר עובד — {DAYS[editCell.dayIdx]} {editCell.shift==="morning"?"☀️ בוקר":"🌙 ערב"}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {[...EMPLOYEES_DEFAULT.map(e=>e.name),"—"].map(name=>(
            <button key={name} onClick={()=>setSelectedName(name)} style={{display:"flex",alignItems:"center",gap:12,border:`1px solid ${selectedName===name?GOLD:BORDER}`,borderRadius:12,padding:"12px 14px",background:selectedName===name?"rgba(216,171,96,0.1)":"rgba(255,255,255,0.03)",cursor:"pointer",transition:"all 0.15s"}}>
              <span style={{fontSize:20}}>{EMPLOYEES_DEFAULT.find(e=>e.name===name)?.avatar||"—"}</span>
              <span style={{fontSize:14,fontWeight:selectedName===name?700:400,color:selectedName===name?GOLD:"#94a3b8"}}>{name}</span>
              {selectedName===name&&<span style={{marginRight:"auto",color:GOLD,fontWeight:700}}>✓</span>}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setEditCell(null)} style={{flex:1,border:`1px solid ${BORDER}`,borderRadius:12,padding:12,background:"transparent",color:"#475569",cursor:"pointer",fontSize:13}}>ביטול</button>
          <button onClick={confirmEdit} style={{flex:2,border:"none",borderRadius:12,padding:12,background:`linear-gradient(135deg,${GOLD},${GOLD2})`,color:"#000",fontWeight:800,cursor:"pointer",fontSize:14}}>אישור</button>
        </div>
      </div>
    </div>}
  </div>;
}

// ── CHECKLIST PAGE ────────────────────────────────────────────────────────────

  const [selected,setSelected]=useState(null);

  if(!selected){
    return <div style={{padding:"20px 16px",animation:"fadeUp 0.4s ease"}}>
      <div style={{fontSize:20,fontWeight:900,marginBottom:4,letterSpacing:-.3}}>✅ צ׳ק ליסטים</div>
      <div style={{fontSize:12,color:"#475569",marginBottom:20}}>בחר סוג משמרת</div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {Object.entries(CHECKLISTS).map(([key,cl])=>{
          const total=cl.sections.reduce((s,sec)=>s+sec.items.length,0);
          const approved=cl.sections.reduce((s,sec,si)=>s+sec.items.filter((_,ii)=>clPhotos[`${key}_${si}_${ii}`]?.status==="approved").length,0);
          const pending=cl.sections.reduce((s,sec,si)=>s+sec.items.filter((_,ii)=>clPhotos[`${key}_${si}_${ii}`]?.status==="pending").length,0);
          const pct=Math.round((approved/total)*100);
          return <Card key={key} style={{padding:"16px 18px",cursor:"pointer",border:`1px solid ${cl.color}25`}} onClick={()=>setSelected(key)}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontWeight:800,fontSize:16}}>{cl.label}</div>
              <div style={{fontWeight:900,fontSize:22,color:cl.color}}>{pct}%</div>
            </div>
            <div style={{background:"rgba(255,255,255,0.06)",borderRadius:10,height:5,overflow:"hidden",marginBottom:8}}>
              <div style={{width:`${pct}%`,height:"100%",borderRadius:10,background:`linear-gradient(90deg,${cl.color},${cl.color}aa)`,transition:"width 0.5s"}}/>
            </div>
            <div style={{display:"flex",gap:10,fontSize:11}}>
              <span style={{color:"#22c55e",fontWeight:600}}>✓ {approved}</span>
              {pending>0&&<span style={{color:"#f97316",fontWeight:600}}>⏳ {pending}</span>}
              <span style={{color:"#334155"}}>{total} פריטים</span>
              <span style={{color:cl.color,marginRight:"auto",fontWeight:600}}>פתח ←</span>
            </div>
          </Card>;
        })}
      </div>
    </div>;
  }

  const cl=CHECKLISTS[selected];
  const total=cl.sections.reduce((s,sec)=>s+sec.items.length,0);
  const approved=cl.sections.reduce((s,sec,si)=>s+sec.items.filter((_,ii)=>clPhotos[`${selected}_${si}_${ii}`]?.status==="approved").length,0);
  const pct=Math.round((approved/total)*100);

  return <div style={{padding:"20px 16px",animation:"fadeUp 0.4s ease"}}>
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:18}}>
      <button onClick={()=>setSelected(null)} style={{background:"rgba(255,255,255,0.05)",border:`1px solid ${BORDER}`,borderRadius:20,padding:"6px 16px",color:"#94a3b8",cursor:"pointer",fontSize:12}}>← חזור</button>
      <div style={{fontWeight:900,fontSize:18,letterSpacing:-.3}}>{cl.label}</div>
    </div>
    <Card style={{padding:"14px 16px",marginBottom:18,border:`1px solid ${cl.color}25`}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:13,fontWeight:700}}>
        <span>{pct===100?"🎉 הושלם!":`${approved} / ${total} אושרו`}</span>
        <span style={{color:cl.color,fontSize:16,fontWeight:900}}>{pct}%</span>
      </div>
      <div style={{background:"rgba(255,255,255,0.06)",borderRadius:10,height:6,overflow:"hidden",marginBottom:6}}>
        <div style={{width:`${pct}%`,height:"100%",borderRadius:10,background:cl.color,transition:"width 0.5s"}}/>
      </div>
      <div style={{fontSize:11,color:"#334155"}}>📸 חובה לצלם תמונה לכל פריט — ללא תמונה לא מזוכה</div>
    </Card>
    {cl.sections.map((sec,si)=>(
      <div key={si} style={{marginBottom:20}}>
        <SectionTitle color={cl.color}>{sec.title}</SectionTitle>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {sec.items.map((item,ii)=>{
            const key=`${selected}_${si}_${ii}`;
            return <ClItem key={ii} item={item} photoKey={key} photo={clPhotos[key]} onSubmit={onSubmit} color={cl.color}/>;
          })}
        </div>
      </div>
    ))}
  </div>;
}

function ClItem({item,photoKey,photo,onSubmit,color}){
  const fileRef=useRef();
  const [open,setOpen]=useState(false);
  const st=photo?.status,done=st==="approved";
  const bg=done?"rgba(22,163,74,0.08)":st==="pending"?"rgba(249,115,22,0.06)":st==="rejected"?"rgba(239,68,68,0.06)":"rgba(255,255,255,0.03)";
  const br=done?"1px solid rgba(22,163,74,0.25)":st==="pending"?"1px solid rgba(249,115,22,0.2)":st==="rejected"?"1px solid rgba(239,68,68,0.2)":`1px solid ${BORDER}`;
  function handleFile(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>onSubmit(photoKey,ev.target.result);r.readAsDataURL(file);}
  return <div style={{borderRadius:12,overflow:"hidden",background:bg,border:br,transition:"all 0.2s"}}>
    <div style={{padding:"10px 14px",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setOpen(o=>!o)}>
      <div style={{width:24,height:24,borderRadius:"50%",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:900,color:"#fff",background:done?"#16a34a":st==="pending"?"#f97316":st==="rejected"?"#ef4444":"rgba(255,255,255,0.07)",border:(!st&&!done)?`1.5px solid ${BORDER}`:"none"}}>
        {done?"✓":st==="pending"?"⏳":st==="rejected"?"✗":""}
      </div>
      <div style={{flex:1}}>
        <div style={{fontSize:12,fontWeight:600,textDecoration:done?"line-through":"none",color:done?"#475569":"#e2e8f0",lineHeight:1.5}}>{item}</div>
        {st==="pending"&&<div style={{fontSize:10,color:"#fb923c",marginTop:2,fontWeight:600}}>⏳ ממתין לאישור מנהל</div>}
        {st==="rejected"&&<div style={{fontSize:10,color:"#f87171",marginTop:2,fontWeight:600}}>✗ נדחה — צלם שוב</div>}
        {done&&photo?.timestamp&&<div style={{fontSize:9,color:"#334155",marginTop:1}}>🕐 {formatStamp(photo.timestamp)}</div>}
      </div>
      <span style={{fontSize:10,color:"#334155"}}>{open?"▲":"▼"}</span>
    </div>
    {open&&<div style={{padding:"0 14px 14px",borderTop:`1px solid ${BORDER}`}}>
      {photo?.url&&<img src={photo.url} alt="תיעוד" style={{width:"100%",maxHeight:160,objectFit:"cover",borderRadius:10,marginBottom:10,marginTop:10,border:done?"2px solid rgba(22,163,74,0.35)":st==="rejected"?"2px solid rgba(239,68,68,0.35)":"2px solid rgba(249,115,22,0.35)"}}/>}
      <input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleFile}/>
      {!done&&st!=="pending"&&<button onClick={()=>fileRef.current.click()} style={{width:"100%",border:"none",borderRadius:10,padding:12,cursor:"pointer",background:st==="rejected"?`linear-gradient(135deg,#ef4444,#dc2626)`:`linear-gradient(135deg,${color},${color}cc)`,color:"#fff",fontWeight:800,fontSize:12,letterSpacing:.3}}>
        📸 {st==="rejected"?"צלם מחדש":"צלם תמונה לאישור"}
      </button>}
      {st==="pending"&&!done&&<div style={{textAlign:"center",fontSize:11,color:"#fb923c",fontWeight:600,padding:"9px",borderRadius:10,background:"rgba(249,115,22,0.08)",border:"1px solid rgba(249,115,22,0.15)"}}>⏳ ממתין לאישור מנהל</div>}
    </div>}
  </div>;
}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
function AdminPage({clPhotos,onApprove,onReject,onClose,pendingCount,managerPin,onChangePin,budget,onChangeBudget,prizes,board}){
  const [filter,setFilter]=useState("pending");
  const [showPinEdit,setShowPinEdit]=useState(false);
  const [showBudget,setShowBudget]=useState(false);
  const [np,setNp]=useState("");
  const [cp,setCp]=useState("");
  const [pm,setPm]=useState(null);
  const [budgetInput,setBudgetInput]=useState(String(budget));

  const allEntries=Object.entries(clPhotos).map(([key,photo])=>{
    const parts=key.split("_");
    const type=parts[0],si=parseInt(parts[1]),ii=parseInt(parts[2]);
    const cl=CHECKLISTS[type];
    const section=cl?.sections[si];
    const item=section?.items[ii];
    return{key,photo,type,clLabel:cl?.label||type,clColor:cl?.color||"#fff",sectionTitle:section?.title||"",item:item||key};
  }).filter(e=>e.item);

  const shown=allEntries.filter(e=>filter==="all"||e.photo.status===filter);
  const counts={
    pending:allEntries.filter(e=>e.photo.status==="pending").length,
    approved:allEntries.filter(e=>e.photo.status==="approved").length,
    rejected:allEntries.filter(e=>e.photo.status==="rejected").length,
  };

  function savePinF(){
    if(np.length!==4||!/^\d+$/.test(np)){setPm({ok:false,text:"PIN חייב להיות 4 ספרות"});return;}
    if(np!==cp){setPm({ok:false,text:"הקודים אינם תואמים"});return;}
    onChangePin(np);setNp("");setCp("");setShowPinEdit(false);
    setPm({ok:true,text:"✓ PIN עודכן"});setTimeout(()=>setPm(null),2000);
  }
  function saveBudgetF(){const v=parseInt(budgetInput);if(!v||v<1)return;onChangeBudget(v);setShowBudget(false);}

  return <div style={{minHeight:"100vh",background:`radial-gradient(ellipse at 20% 0%,rgba(216,171,96,0.06),transparent 60%),${DARK}`}}>
    <header style={{background:"rgba(10,10,15,0.95)",borderBottom:`1px solid rgba(216,171,96,0.2)`,padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:"0 4px 24px rgba(0,0,0,0.4)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${GOLD},${GOLD2})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>👔</div>
        <div>
          <div style={{fontWeight:900,fontSize:15,color:GOLD}}>פאנל מנהל</div>
          <div style={{fontSize:9,color:"#334155",letterSpacing:.5}}>גולדה זכרון יעקב</div>
        </div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setShowBudget(v=>!v)} style={{background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:20,padding:"5px 12px",color:"#22c55e",cursor:"pointer",fontSize:11,fontWeight:700}}>💰 תקציב</button>
        <button onClick={()=>setShowPinEdit(v=>!v)} style={{background:`rgba(216,171,96,0.08)`,border:`1px solid rgba(216,171,96,0.2)`,borderRadius:20,padding:"5px 12px",color:GOLD,cursor:"pointer",fontSize:11,fontWeight:700}}>⚙️ PIN</button>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${BORDER}`,borderRadius:20,padding:"5px 14px",color:"#475569",cursor:"pointer",fontSize:12}}>✕ יציאה</button>
      </div>
    </header>
    <div style={{padding:16}}>
      {showBudget&&<Card style={{padding:16,marginBottom:16,border:"1px solid rgba(34,197,94,0.2)"}}>
        <SectionTitle color="#22c55e">💰 תקציב חודשי</SectionTitle>
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
          <input type="number" min="1" value={budgetInput} onChange={e=>setBudgetInput(e.target.value)} style={{flex:1,background:"rgba(255,255,255,0.05)",border:`1px solid ${BORDER}`,borderRadius:12,padding:"10px",color:"#f1f5f9",fontSize:22,textAlign:"center",outline:"none",fontFamily:"Heebo,sans-serif"}}/>
          <span style={{fontSize:20,color:"#22c55e",fontWeight:700}}>₪</span>
        </div>
        <div style={{borderRadius:12,padding:"10px 14px",background:"rgba(0,0,0,0.2)",marginBottom:12}}>
          {["🥇","🥈","🥉"].map((m,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"4px 0"}}>
              <span style={{color:"#64748b"}}>{m} מקום {i+1}</span>
              <span style={{fontWeight:700,color:[GOLD,"#94a3b8","#d97706"][i]}}>₪{Math.round((parseInt(budgetInput)||0)*PRIZE_SPLIT[i])}</span>
            </div>
          ))}
        </div>
        <button onClick={saveBudgetF} style={{width:"100%",border:"none",borderRadius:12,padding:12,cursor:"pointer",background:"linear-gradient(135deg,#15803d,#16a34a)",color:"#fff",fontWeight:800,fontSize:13}}>שמור</button>
      </Card>}

      {showPinEdit&&<Card style={{padding:16,marginBottom:16,border:`1px solid rgba(216,171,96,0.2)`}}>
        <SectionTitle>🔑 שינוי PIN</SectionTitle>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <input type="password" inputMode="numeric" maxLength={4} placeholder="PIN חדש" value={np} onChange={e=>setNp(e.target.value.replace(/\D/g,""))} style={{background:"rgba(255,255,255,0.05)",border:`1px solid ${BORDER}`,borderRadius:12,padding:12,color:"#f1f5f9",fontSize:20,textAlign:"center",letterSpacing:10,outline:"none",fontFamily:"Heebo,sans-serif"}}/>
          <input type="password" inputMode="numeric" maxLength={4} placeholder="אשר PIN" value={cp} onChange={e=>setCp(e.target.value.replace(/\D/g,""))} style={{background:"rgba(255,255,255,0.05)",border:`1px solid ${BORDER}`,borderRadius:12,padding:12,color:"#f1f5f9",fontSize:20,textAlign:"center",letterSpacing:10,outline:"none",fontFamily:"Heebo,sans-serif"}}/>
          {pm&&<div style={{fontSize:12,color:pm.ok?"#4ade80":"#f87171",textAlign:"center",fontWeight:700}}>{pm.text}</div>}
          <button onClick={savePinF} style={{border:"none",borderRadius:12,padding:12,cursor:"pointer",background:`linear-gradient(135deg,${GOLD},${GOLD2})`,color:"#000",fontWeight:800,fontSize:13}}>שמור PIN</button>
        </div>
      </Card>}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
        {[{label:"ממתינות",count:counts.pending,color:"#f97316"},{label:"אושרו",count:counts.approved,color:"#22c55e"},{label:"נדחו",count:counts.rejected,color:"#ef4444"}].map((s,i)=>(
          <Card key={i} style={{padding:12,textAlign:"center",border:`1px solid ${s.color}25`}}>
            <div style={{fontSize:24,fontWeight:900,color:s.color}}>{s.count}</div>
            <div style={{fontSize:11,color:"#475569"}}>{s.label}</div>
          </Card>
        ))}
      </div>

      <Card style={{padding:"14px 16px",marginBottom:16,border:`1px solid rgba(216,171,96,0.15)`}}>
        <div style={{fontSize:11,color:GOLD,fontWeight:700,marginBottom:10,letterSpacing:.5}}>🏆 פרסי החודש — תקציב ₪{budget}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {["🥇","🥈","🥉"].map((m,i)=>(
            <div key={i} style={{textAlign:"center",borderRadius:12,padding:10,background:"rgba(0,0,0,0.2)"}}>
              <div style={{fontSize:20}}>{m}</div>
              <div style={{fontWeight:900,fontSize:16,color:[GOLD,"#94a3b8","#d97706"][i]}}>₪{prizes[i]}</div>
              <div style={{fontSize:10,color:"#334155",marginTop:2}}>{board[i]?.name||"???"}</div>
            </div>
          ))}
        </div>
      </Card>

      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {[{id:"pending",label:"⏳ ממתינות"},{id:"approved",label:"✓ אושרו"},{id:"rejected",label:"✗ נדחו"},{id:"all",label:"הכל"}].map(f=>(
          <button key={f.id} onClick={()=>setFilter(f.id)} style={{border:"none",borderRadius:20,padding:"6px 14px",fontSize:11,fontWeight:600,cursor:"pointer",background:filter===f.id?GOLD:"rgba(255,255,255,0.05)",color:filter===f.id?"#000":"#475569",transition:"all 0.2s"}}>{f.label}</button>
        ))}
      </div>

      {shown.length===0&&<div style={{textAlign:"center",padding:40,color:"#334155",fontSize:14}}>אין תיעודים בקטגוריה זו</div>}
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {shown.map(e=><AdminPhotoCard key={e.key} entry={e} onApprove={onApprove} onReject={onReject}/>)}
      </div>
    </div>
  </div>;
}

  const st=entry.photo.status;

        <button onClick={()=>rating&&onApprove(entry.key,rating)} style={{flex:1,border:"none",borderRadius:12,padding:12,cursor:rating?"pointer":"not-allowed",background:rating?"linear-gradient(135deg,#15803d,#16a34a)":"rgba(255,255,255,0.04)",color:rating?"#fff":"#334155",fontWeight:800,fontSize:13}}>
          {rating?"✓ אשר":"⭐ בחר דירוג"}

      </div>}
      {st!=="pending"&&<div style={{padding:"0 14px 14px",display:"flex",justifyContent:"center"}}>
        <button onClick={()=>st==="approved"?onReject(entry.key):rating&&onApprove(entry.key,rating)} style={{border:`1px solid ${BORDER}`,borderRadius:12,padding:"8px 20px",background:"transparent",color:"#475569",cursor:"pointer",fontSize:11}}>
          {st==="approved"?"בטל אישור":"אשר בכל זאת"}
        </button>
      </div>}

// ── LEADERBOARD ───────────────────────────────────────────────────────────────
function LeaderboardPage({board,prizes,budget}){
  const medals=["🥇","🥈","🥉"];
  return <div style={{padding:"20px 16px",animation:"fadeUp 0.4s ease"}}>
    <div style={{fontSize:20,fontWeight:900,marginBottom:4,letterSpacing:-.3}}>🏆 לוח דירוג</div>
    <div style={{fontSize:12,color:"#475569",marginBottom:16}}>מי האלוף של החודש?</div>
    <Card style={{padding:14,marginBottom:20,border:`1px solid rgba(216,171,96,0.15)`}}>
      <div style={{fontSize:11,color:GOLD,fontWeight:700,marginBottom:10,textAlign:"center",letterSpacing:.5}}>תקציב ₪{budget} | חלוקה 70/20/10</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
        {medals.map((m,i)=>(
          <div key={i} style={{textAlign:"center",borderRadius:12,padding:12,background:"rgba(0,0,0,0.2)"}}>
            <div style={{fontSize:22}}>{m}</div>
            <div style={{fontWeight:900,fontSize:16,color:[GOLD,"#94a3b8","#d97706"][i]}}>₪{prizes?.[i]??""}</div>
            <div style={{fontSize:10,color:"#334155",marginTop:3}}>{board[i]?.name||"???"}</div>
          </div>
        ))}
      </div>
    </Card>
    {/* Podium */}
    <div style={{display:"flex",justifyContent:"center",alignItems:"flex-end",gap:10,marginBottom:24}}>
      {[1,0,2].map((idx,pos)=>{
        const emp=board[idx];if(!emp)return null;
        const h=[92,128,72][pos];const isMine=emp.id===4;
        return <div key={emp.id} style={{display:"flex",flexDirection:"column",alignItems:"center",width:90}}>
          <div style={{fontSize:20,marginBottom:2}}>{medals[idx]}</div>
          <div style={{fontSize:22}}>{emp.avatar}</div>
          <div style={{fontSize:10,fontWeight:700,textAlign:"center",marginBottom:5,color:isMine?"#ec4899":"#e2e8f0"}}>{emp.name}{isMine?" 👈":""}</div>
          <div style={{width:"100%",height:h,borderRadius:"10px 10px 0 0",background:idx===0?`linear-gradient(180deg,${GOLD2},${GOLD})`:idx===1?"linear-gradient(180deg,#94a3b8,#64748b)":"linear-gradient(180deg,#d97706,#92400e)",display:"flex",alignItems:"center",justifyContent:"center",color:"#000",fontWeight:900,fontSize:12,boxShadow:idx===0?`0 -4px 20px rgba(216,171,96,0.3)`:"none"}}>{emp.points}⭐</div>
        </div>;
      })}
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:8}}>
      {board.map((emp,i)=>{
        const isMine=emp.id===4;
        return <Card key={emp.id} style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:12,border:isMine?`1px solid rgba(236,72,153,0.3)`:`1px solid ${BORDER}`,background:isMine?"rgba(236,72,153,0.06)":CARD}}>
          <div style={{fontSize:14,width:28,textAlign:"center",fontWeight:800,color:i<3?[GOLD,"#94a3b8","#d97706"][i]:"#334155"}}>{i<3?medals[i]:`#${i+1}`}</div>
          <span style={{fontSize:22}}>{emp.avatar}</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:700,fontSize:13,color:isMine?"#f472b6":"#f1f5f9"}}>{emp.name}{isMine?" (אתה)":""}</div>
            <div style={{fontSize:10,color:"#475569",marginTop:1}}>🔥 {emp.streak} ימים</div>
          </div>
          <div style={{fontWeight:900,fontSize:14,color:GOLD}}>{emp.points}⭐</div>
        </Card>;
      })}
    </div>
  </div>;
}

// ── VIDEOS ────────────────────────────────────────────────────────────────────
function VideosPage({filter,setFilter}){
  const cats=["הכל",...new Set(VIDEOS.map(v=>v.cat))];
  const shown=filter==="הכל"?VIDEOS:VIDEOS.filter(v=>v.cat===filter);
  return <div style={{padding:"20px 16px",animation:"fadeUp 0.4s ease"}}>
    <div style={{fontSize:20,fontWeight:900,marginBottom:14,letterSpacing:-.3}}>🎬 סרטוני הדרכה</div>
    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
      {cats.map(c=><button key={c} onClick={()=>setFilter(c)} style={{border:`1px solid ${filter===c?GOLD:BORDER}`,borderRadius:20,padding:"5px 14px",fontSize:11,fontWeight:600,cursor:"pointer",background:filter===c?`rgba(216,171,96,0.15)`:"transparent",color:filter===c?GOLD:"#475569",transition:"all 0.2s"}}>{c}</button>)}
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {shown.map(v=><Card key={v.id} style={{overflow:"hidden",display:"flex",alignItems:"center",cursor:"pointer"}}>
        <div style={{width:80,minHeight:72,flexShrink:0,background:"linear-gradient(135deg,#1e1b4b,#312e81)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>▶️</div>
        <div style={{padding:"12px 14px",flex:1}}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:5}}>{v.title}</div>
          <div style={{display:"flex",gap:10}}>
            <span style={{fontSize:11,color:"#334155"}}>⏱ {v.dur}</span>
            <span style={{fontSize:11,color:"#334155"}}>👁 {v.views}</span>
            <span style={{fontSize:10,borderRadius:8,padding:"2px 8px",fontWeight:600,background:"rgba(139,92,246,0.15)",color:"#a78bfa"}}>{v.cat}</span>
          </div>
        </div>
      </Card>)}
    </div>
  </div>;
}

// ── MESSAGES ──────────────────────────────────────────────────────────────────
function MessagesPage(){
  return <div style={{padding:"20px 16px",animation:"fadeUp 0.4s ease"}}>
    <div style={{fontSize:20,fontWeight:900,marginBottom:18,letterSpacing:-.3}}>💬 הודעות</div>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {MESSAGES.map(m=><Card key={m.id} style={{padding:"14px 16px",border:m.urgent?"1px solid rgba(239,68,68,0.25)":`1px solid ${BORDER}`,background:m.urgent?"rgba(239,68,68,0.06)":CARD}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
          <span style={{fontWeight:700,fontSize:12,color:m.urgent?"#f87171":GOLD}}>{m.urgent?"🚨 ":""}{m.from}</span>
          <span style={{fontSize:10,color:"#334155"}}>{m.time}</span>
        </div>
        <div style={{fontSize:13,color:"#cbd5e1",lineHeight:1.6}}>{m.text}</div>
      </Card>)}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
