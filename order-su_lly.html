<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="הזמנות ספקים">
<title>הזמנות ספקים</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2e0d8;
    --border-light: #ede9e1;
    --text: #1a1814;
    --text-sub: #7a7670;
    --accent: #2c5f2e;
    --accent-light: #e8f0e8;
    --green: #25D366;
    --radius: 14px;
    --radius-sm: 8px;
  }
  body { font-family: 'Segoe UI', 'Arial Hebrew', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }
  .top-bar { background: var(--accent); color: white; padding: 18px 20px 14px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
  .top-bar h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .top-bar p { font-size: 12px; opacity: 0.75; margin-top: 2px; }
  .save-badge { font-size: 11px; background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 20px; }
  .tabs-wrap { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 12px; display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; position: sticky; top: 62px; z-index: 99; }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tab-btn { padding: 14px 14px; border: none; background: none; color: var(--text-sub); font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.2s; position: relative; font-family: inherit; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-dot { position: absolute; top: 10px; left: 4px; width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: none; }
  .panel { display: none; padding: 16px; }
  .panel.active { display: block; }
  .section-header { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-sub); padding: 20px 0 8px; border-bottom: 1px solid var(--border-light); margin-bottom: 4px; }
  .section-header:first-child { padding-top: 4px; }
  .product-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius-sm); transition: background 0.15s; margin: 2px -4px; }
  .product-row.has-qty { background: var(--accent-light); }
  .product-name { flex: 1; font-size: 15px; color: var(--text); line-height: 1.3; }
  .qty-wrap { display: flex; align-items: center; gap: 6px; }
  .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--surface); color: var(--text); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-family: inherit; }
  .qty-btn:active { transform: scale(0.92); }
  .qty-input { width: 44px; height: 32px; text-align: center; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text); font-size: 15px; font-family: inherit; }
  .unit-select { height: 32px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text-sub); font-size: 13px; padding: 0 4px; cursor: pointer; font-family: inherit; max-width: 72px; }
  .bottom-bar { position: sticky; bottom: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 12px 16px; display: flex; gap: 10px; align-items: center; }
  .wa-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 20px; border-radius: var(--radius); border: none; background: var(--accent); color: white; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .wa-btn:active { transform: scale(0.97); opacity: 0.9; }
  .clear-btn { padding: 14px 16px; border-radius: var(--radius); border: 1.5px solid var(--border); background: transparent; color: var(--text-sub); font-size: 14px; cursor: pointer; font-family: inherit; }
  .summary-chip { font-size: 12px; background: var(--accent); color: white; padding: 3px 9px; border-radius: 20px; display: none; }
  .preview-box { display: none; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin: 16px 0 80px; }
  .preview-box h3 { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 10px; }
  .msg-text { font-size: 13px; line-height: 1.7; white-space: pre-wrap; background: var(--bg); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 12px; color: var(--text); }
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .wa-open { display: inline-flex; align-items: center; gap: 6px; padding: 12px 20px; border-radius: var(--radius); background: var(--green); color: white; font-size: 14px; font-weight: 600; text-decoration: none; font-family: inherit; }
  .copy-btn { display: inline-flex; align-items: center; gap: 6px; padding: 12px 16px; border-radius: var(--radius); border: 1.5px solid var(--border); background: var(--surface); color: var(--text); font-size: 14px; cursor: pointer; font-family: inherit; }
  .self-note { font-size: 12px; color: var(--text-sub); text-align: center; padding: 6px 0 2px; }
</style>
</head>
<body>
<div class="top-bar">
  <div>
    <h1>📦 הזמנות ספקים</h1>
    <p>גולדה + סנדוויצ'ים</p>
  </div>
  <div class="save-badge" id="saveBadge">✓ נשמר</div>
</div>
<div class="tabs-wrap" id="tabs"></div>
<div id="panels"></div>
<script>
const MY_NUMBER = "972508357494";
const suppliers = [
  {
    id: "fruits", name: "פירות וירקות", contact: "אחמד", phone: "972504841626", sendToSelf: false,
    sections: [
      { label: "גולדה — פירות", msgTitle: "גולדה", items: ["תפוח ירוק","מלון","ענבים שחורים","ענבים ירוקים","אננס תוצרת חוץ","שק תפוזים","אבטיח","נענע","שמן קנולה","נייר אפייה","חלב רגיל","נייר נצמד"] },
      { label: "בוליש — ירקות", msgTitle: "בוליש", items: ["עגבניות רגילות (קשיחות)","כרוב לבן","חסה","פטריות","גמבה אדומה","שיני שום","בצל לבן ארגז","בצל סגול ארגז","פטרוזיליה","שמיר","סלק וואקום","ביצים"] }
    ]
  },
  {
    id: "dry", name: "יבשים (בוליש)", contact: "", phone: MY_NUMBER, sendToSelf: true,
    sections: [
      { label: "רטבים ותבלינים", msgTitle: "יבשים", items: ["צ'ילי מתוק","מיונז","חרדל חלק","חרדל דיז'ון","סרירצ'ה","קטשופ","רוטב שזיפים","רוטב ברביקיו","סחוג","זיתים","פלפל חלפיניו פרוסות","פלפלים קלויים","כרוב כבוש","מלפפון בחומץ"] },
      { label: "שמנים וחומצים", msgTitle: "יבשים", items: ["שמן קנולה","שמן זית","חומץ","חומץ בלסמי"] },
      { label: "תבלינים יבשים", msgTitle: "יבשים", items: ["מלח שולחן","מלח גס","פלפל שחור גרוס","פלפל שחור גס","פלפל לבן","קארי","כורכום","כמון","מלח לימון"] },
      { label: "שונות", msgTitle: "יבשים", items: ["קריספי צ'יפס","טופו","שבבי בצל","פסטו"] }
    ]
  },
  {
    id: "cleaning", name: "ניקיון", contact: "", phone: MY_NUMBER, sendToSelf: true,
    sections: [
      { label: "גולדה", msgTitle: "גולדה", items: ["נייר תעשייתי","נייר טואלט","נייר צץ רץ","נייר דיספנסרים","מילוי מגבונים","כפפות S","כפפות M","כפפות L","כפפות XL","אקונומיקה","מסיר שומנים","נוזל רצפות","נוזל מבריק חלונות","נוזל כלים","סבון ידיים","שקיות זבל","סקווצ'ים","ברזלית","מטאטא","יאה","מטליות גליל צהוב","נייר נצמד"] },
      { label: "סנדוויצ'ים", msgTitle: "סנדוויצ'ים", items: ["נייר טואלט","נייר צץ רץ","נייר דיספנסרים","מילוי מגבונים","כפפות S","כפפות M","כפפות L","כפפות XL","אקונומיקה","מסיר שומנים","נוזל רצפות","נוזל מבריק חלונות","נוזל כלים","סבון ידיים","שקיות זבל","סקווצ'ים","ברזלית","מטאטא","יאה","מטליות גליל צהוב","נייר למגש","נייר עטיפה","מפיות לבנות","קוקוטים עם מכסה","קוקוטים שחורים","שקיות נייר","קופסאות לסנדוויצים T.A","שקיות חילוק","שקיות זבל","שקיות סנדוויץ'","נייר כסף","מגבונים אישיים","נייר נצמד"] }
    ]
  },
  {
    id: "meat", name: "בשר (הנדלס)", contact: "", phone: MY_NUMBER, sendToSelf: true,
    sections: [
      { label: "מוצרים", msgTitle: null, items: ["פסטרמה אמיתית","סלמי איטלקי","רוסטביף (צלי בקר)","מעדן אווז","בריסקט (פרוס)","קורנביף ניו יורק פרוס","אסאדו מפורק מסחרי","בריסקט ניו יורק גוש","נקניקיות עוף","נקניקיות עגל"] }
    ]
  },
  {
    id: "batter", name: "בלילות (שאבא)", contact: "", phone: MY_NUMBER, sendToSelf: true,
    sections: [
      { label: "מוצרים", msgTitle: null, items: ["וופל בלגי","קרפ צרפתי"] }
    ]
  },
  {
    id: "coffee", name: "קפה", contact: "", phone: MY_NUMBER, sendToSelf: true,
    sections: [
      { label: "מוצרים", msgTitle: null, items: ["חבילת 10 ק\"ג קפה","קפה נטול","סוכר לבן","סוכר חום","סוכרזית","חומר ניקוי מכונת קפה","מלח לריכוך","ספל גדול","ספל קטן","כוס אספרסו","תחתית ספל גדול","תחתית ספל קטן","תחתית אספרסו","זכוכית קטן","זכוכית גדול","תחתית זכוכית"] }
    ]
  }
];
const units = ["יח'","ק\"ג","גרם","ליטר","מ\"ל","ארגז","שק","חבילה","גליל","קרטון","צנצנת","קופסא"];
const STORAGE_KEY = 'supplier_orders_v1';
const state = {};
suppliers.forEach(s => {
  state[s.id] = {};
  s.sections.forEach(sec => {
    sec.items.forEach(item => {
      const key = sec.label + '||' + item;
      state[s.id][key] = { qty: 0, unit: "יח'", name: item, msgTitle: sec.msgTitle };
    });
  });
});
function saveState() {
  const data = {};
  suppliers.forEach(s => {
    data[s.id] = {};
    Object.entries(state[s.id]).forEach(([k, v]) => { if (v.qty > 0) data[s.id][k] = { qty: v.qty, unit: v.unit }; });
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  const badge = document.getElementById('saveBadge');
  badge.textContent = '✓ נשמר';
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    suppliers.forEach(s => {
      if (data[s.id]) {
        Object.entries(data[s.id]).forEach(([k, v]) => { if (state[s.id][k]) { state[s.id][k].qty = v.qty; state[s.id][k].unit = v.unit; } });
      }
    });
  } catch(e) {}
}
function buildTabs() {
  const wrap = document.getElementById('tabs');
  suppliers.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.id = 'tab-' + s.id;
    btn.innerHTML = s.name + '<span class="tab-dot" id="dot-' + s.id + '"></span>';
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + s.id).classList.add('active');
    };
    wrap.appendChild(btn);
  });
}
function updateDots() {
  suppliers.forEach(s => {
    const has = Object.values(state[s.id]).some(v => v.qty > 0);
    const dot = document.getElementById('dot-' + s.id);
    if (dot) dot.style.display = has ? 'block' : 'none';
  });
}
function buildPanels() {
  const container = document.getElementById('panels');
  suppliers.forEach((s, i) => {
    const panel = document.createElement('div');
    panel.className = 'panel' + (i === 0 ? ' active' : '');
    panel.id = 'panel-' + s.id;
    s.sections.forEach(sec => {
      const hdr = document.createElement('div');
      hdr.className = 'section-header';
      hdr.textContent = sec.label;
      panel.appendChild(hdr);
      sec.items.forEach(item => {
        const key = sec.label + '||' + item;
        const row = document.createElement('div');
        row.className = 'product-row' + (state[s.id][key].qty > 0 ? ' has-qty' : '');
        const name = document.createElement('span');
        name.className = 'product-name';
        name.textContent = item;
        const wrap = document.createElement('div');
        wrap.className = 'qty-wrap';
        const minus = document.createElement('button');
        minus.className = 'qty-btn';
        minus.textContent = '−';
        const input = document.createElement('input');
        input.type = 'number';
        input.className = 'qty-input';
        input.min = 0;
        input.placeholder = '0';
        if (state[s.id][key].qty > 0) input.value = state[s.id][key].qty;
        const plus = document.createElement('button');
        plus.className = 'qty-btn';
        plus.textContent = '+';
        const unitSel = document.createElement('select');
        unitSel.className = 'unit-select';
        units.forEach(u => {
          const opt = document.createElement('option');
          opt.value = u; opt.textContent = u;
          if (u === state[s.id][key].unit) opt.selected = true;
          unitSel.appendChild(opt);
        });
        const onChange = () => {
          const has = state[s.id][key].qty > 0;
          if (has) row.classList.add('has-qty'); else row.classList.remove('has-qty');
          updateSummary(s.id); updateDots(); saveState();
        };
        minus.onclick = () => { const v=Math.max(0,(parseInt(input.value)||0)-1); input.value=v||''; state[s.id][key].qty=v; onChange(); };
        plus.onclick = () => { const v=(parseInt(input.value)||0)+1; input.value=v; state[s.id][key].qty=v; onChange(); };
        input.oninput = () => { state[s.id][key].qty=parseInt(input.value)||0; onChange(); };
        unitSel.onchange = () => { state[s.id][key].unit=unitSel.value; saveState(); };
        wrap.appendChild(minus); wrap.appendChild(input); wrap.appendChild(plus); wrap.appendChild(unitSel);
        row.appendChild(name); row.appendChild(wrap);
        panel.appendChild(row);
      });
    });
    const preview = document.createElement('div');
    preview.className = 'preview-box';
    preview.id = 'preview-' + s.id;
    panel.appendChild(preview);
    const bottomBar = document.createElement('div');
    bottomBar.className = 'bottom-bar';
    const chip = document.createElement('span');
    chip.className = 'summary-chip';
    chip.id = 'chip-' + s.id;
    const waBtn = document.createElement('button');
    waBtn.className = 'wa-btn';
    waBtn.innerHTML = '📲 ' + (s.sendToSelf ? 'הכן הזמנה לשליחה' : 'הכן הזמנה לאחמד');
    waBtn.onclick = () => showPreview(s);
    const clearBtn = document.createElement('button');
    clearBtn.className = 'clear-btn';
    clearBtn.textContent = 'נקה';
    clearBtn.onclick = () => clearAll(s.id, panel);
    if (s.sendToSelf) {
      const note = document.createElement('div');
      note.className = 'self-note';
      note.textContent = 'ישלח אליך לאישור לפני העברה לספק';
      panel.appendChild(note);
    }
    bottomBar.appendChild(chip); bottomBar.appendChild(waBtn); bottomBar.appendChild(clearBtn);
    panel.appendChild(bottomBar);
    container.appendChild(panel);
  });
}
function updateSummary(sid) {
  const count = Object.values(state[sid]).filter(v => v.qty > 0).length;
  const chip = document.getElementById('chip-' + sid);
  if (!chip) return;
  if (count > 0) { chip.style.display = 'inline-flex'; chip.textContent = count + ' פריטים'; }
  else { chip.style.display = 'none'; }
}
function clearAll(sid, panel) {
  Object.keys(state[sid]).forEach(k => state[sid][k].qty = 0);
  panel.querySelectorAll('.qty-input').forEach(inp => inp.value = '');
  panel.querySelectorAll('.product-row').forEach(r => r.classList.remove('has-qty'));
  updateSummary(sid); updateDots(); saveState();
  const p = document.getElementById('preview-' + sid);
  if (p) p.style.display = 'none';
}
function buildMessage(s) {
  const items = Object.values(state[s.id]).filter(v => v.qty > 0);
  if (!items.length) return null;
  const date = new Date().toLocaleDateString('he-IL');
  const groups = {};
  items.forEach(v => { const t = v.msgTitle || s.name; if (!groups[t]) groups[t]=[]; groups[t].push(v); });
  let msg = 'הזמנה — ' + s.name + '\nתאריך - ' + date + '\n';
  Object.entries(groups).forEach(([title, its]) => {
    if (Object.keys(groups).length > 1) msg += '\n' + title + '\n';
    its.forEach(v => { msg += '• ' + v.name + ' - ' + v.qty + ' ' + v.unit + '\n'; });
  });
  msg += '\nתודה!';
  return msg;
}
function showPreview(s) {
  const msg = buildMessage(s);
  if (!msg) { alert('לא סימנת כמויות — בחר מוצרים לפני השליחה'); return; }
  const waUrl = 'https://wa.me/' + s.phone + '?text=' + encodeURIComponent(msg);
  const preview = document.getElementById('preview-' + s.id);
  preview.style.display = 'block';
  preview.innerHTML = '<h3>✅ ההזמנה מוכנה</h3><div class="msg-text">' + msg.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</div><div class="btn-row"><a class="wa-open" href="' + waUrl + '">📲 פתח בוואטסאפ</a><button class="copy-btn" id="cpbtn-' + s.id + '" onclick="copyMsg(\'' + s.id + '\')">📋 העתק</button></div>';
  preview.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
function copyMsg(sid) {
  const s = suppliers.find(x => x.id === sid);
  const msg = buildMessage(s);
  if (msg) {
    navigator.clipboard.writeText(msg).then(() => {
      const btn = document.getElementById('cpbtn-' + sid);
      if (btn) { btn.textContent = '✓ הועתק!'; setTimeout(() => btn.textContent = '📋 העתק', 2000); }
    });
  }
}
loadState();
buildTabs();
buildPanels();
suppliers.forEach(s => updateSummary(s.id));
updateDots();
</script>
</body>
</html>
